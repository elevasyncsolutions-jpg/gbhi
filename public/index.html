<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Solana Dream Engine V3 Auto</title>
  <style>
    :root{--bg:#06080d;--card:#101722;--muted:#8da2b8;--text:#edf7ff;--line:#223044;--good:#31f29c;--bad:#ff4c6a;--warn:#ffd166;--blue:#52a8ff}
    body{margin:0;background:radial-gradient(circle at 20% 0,#132847,#06080d 35%),#06080d;color:var(--text);font-family:Inter,system-ui,Arial,sans-serif}
    .wrap{max-width:1180px;margin:0 auto;padding:28px}.hero{display:flex;justify-content:space-between;gap:16px;align-items:center}.title{font-size:34px;font-weight:900;letter-spacing:-.04em}.sub{color:var(--muted);margin-top:8px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:20px}.card{background:rgba(16,23,34,.84);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.25);backdrop-filter:blur(12px)}.card h3{margin:0 0 8px;font-size:13px;text-transform:uppercase;color:var(--muted);letter-spacing:.08em}.big{font-size:24px;font-weight:800}.actions{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.btn{border:0;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;background:var(--blue);color:#00101e}.btn.secondary{background:#1b2738;color:var(--text);border:1px solid var(--line)}.btn.danger{background:var(--bad);color:white}.btn.warn{background:var(--warn);color:#120b00}.login{max-width:420px;margin:12vh auto}.login input{width:100%;box-sizing:border-box;border-radius:14px;background:#0b111b;color:white;border:1px solid var(--line);padding:14px;margin:14px 0;font-size:16px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:10px;text-align:left;font-size:13px}.pill{display:inline-block;border-radius:999px;padding:4px 9px;font-weight:800;font-size:12px}.good{background:rgba(49,242,156,.15);color:var(--good)}.bad{background:rgba(255,76,106,.14);color:var(--bad)}.warnp{background:rgba(255,209,102,.14);color:var(--warn)}pre{white-space:pre-wrap;word-break:break-word;background:#060a12;border:1px solid var(--line);border-radius:16px;padding:14px;color:#b9d4ea;max-height:280px;overflow:auto}.two{display:grid;grid-template-columns:1.4fr .6fr;gap:14px}@media(max-width:900px){.grid,.two{grid-template-columns:1fr}.hero{display:block}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
let token = localStorage.getItem('sde_token') || '';
const app = document.getElementById('app');
async function api(path, opts={}){ const r = await fetch(path,{...opts,headers:{'content-type':'application/json','authorization':'Bearer '+token,...(opts.headers||{})}}); const j = await r.json().catch(()=>({})); if(!r.ok) throw new Error(j.error||'Request failed'); return j; }
function loginView(){ app.innerHTML=`<div class="login card"><div class="title">Dream Engine V3</div><div class="sub">Autopilot cockpit. Use only a tiny hot wallet.</div><input id="pw" type="password" placeholder="Password" autofocus /><button class="btn" onclick="login()">Enter Cockpit</button><pre>Default password from your request: Flowwwww1234\nKeep DRY_RUN=true first. Never use your main wallet private key.</pre></div>`; }
async function login(){ try{ const j=await api('/api/login',{method:'POST',body:JSON.stringify({password:document.getElementById('pw').value})}); token=j.token; localStorage.setItem('sde_token',token); dashboard(); }catch(e){alert(e.message)} }
async function dashboard(){ try{ const j=await api('/api/status'); render(j); }catch(e){loginView()} }
function pill(v){ if(v===true || v==='AUTO_CANDIDATE') return `<span class="pill good">${v}</span>`; if(v==='REJECT'||v===false) return `<span class="pill bad">${v}</span>`; return `<span class="pill warnp">${v}</span>`; }
function render(j){ const s=j.state, c=j.cfg; const items=s.lastScan?.items||[]; app.innerHTML=`<div class="wrap"><div class="hero"><div><div class="title">Solana Dream Engine V3 Auto</div><div class="sub">Scanner → AI score → Telegram → guarded autopilot → payout proof</div></div><button class="btn secondary" onclick="localStorage.removeItem('sde_token');location.reload()">Logout</button></div><div class="grid"><div class="card"><h3>Mode</h3><div class="big">${c.dryRun?'DRY RUN':'LIVE'}</div></div><div class="card"><h3>Autopilot</h3><div class="big">${pill(c.autoRunning)}</div></div><div class="card"><h3>Balance</h3><div class="big">${j.balanceSol==null?'No wallet':Number(j.balanceSol).toFixed(5)+' SOL'}</div></div><div class="card"><h3>Hot Wallet</h3><div class="sub">${c.wallet||'not configured'}</div></div></div><div class="actions"><button class="btn" onclick="scan()">Scan Now</button><button class="btn secondary" onclick="startAuto()">Start Autopilot</button><button class="btn warn" onclick="stopAuto()">Stop Autopilot</button><button class="btn secondary" onclick="payout()">Manual Payout Proof</button><button class="btn danger" onclick="panic()">PANIC STOP</button></div><div class="two"><div class="card"><h3>Latest candidates</h3><table class="table"><thead><tr><th>Token</th><th>Score</th><th>Decision</th><th>Flags</th></tr></thead><tbody>${items.map(x=>`<tr><td><b>${x.symbol||'?'}</b><br><span class="sub">${x.address}</span></td><td>${x.finalScore}</td><td>${pill(x.decision)}</td><td>${(x.hard?.flags||[]).join(', ')||'clean'}</td></tr>`).join('')||'<tr><td colspan="4">No scan yet.</td></tr>'}</tbody></table></div><div class="card"><h3>Safety config</h3><pre>${JSON.stringify({dryRun:c.dryRun,autoTradingEnv:c.autoTradingEnv,panic:c.panic,maxTradeSol:c.maxTradeSol,minScore:c.minScore,reserveSol:c.reserveSol},null,2)}</pre><h3>Recent alerts</h3><pre>${(s.alerts||[]).slice(0,8).map(a=>a.at+'\n'+a.text).join('\n\n')}</pre></div></div><div class="card" style="margin-top:14px"><h3>Open positions / trade log</h3><pre>${JSON.stringify({positions:s.positions,trades:s.trades.slice(0,10)},null,2)}</pre></div></div>`; }
async function scan(){ try{ await api('/api/scan',{method:'POST',body:'{}'}); dashboard(); }catch(e){alert(e.message)} }
async function startAuto(){ try{ await api('/api/autopilot/start',{method:'POST',body:'{}'}); dashboard(); }catch(e){alert(e.message)} }
async function stopAuto(){ try{ await api('/api/autopilot/stop',{method:'POST',body:'{}'}); dashboard(); }catch(e){alert(e.message)} }
async function panic(){ if(!confirm('Stop autopilot now?'))return; try{ await api('/api/panic',{method:'POST',body:'{}'}); dashboard(); }catch(e){alert(e.message)} }
async function payout(){ if(!confirm('Run payout proof/live payout depending on DRY_RUN?'))return; try{ const r=await api('/api/payout',{method:'POST',body:'{}'}); alert(JSON.stringify(r,null,2)); dashboard(); }catch(e){alert(e.message)} }
if(token) dashboard(); else loginView(); setInterval(()=>{ if(token) dashboard(); }, 15000);
</script>
</body>
</html>
